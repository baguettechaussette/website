name: Update sitemap.xml (weekly)

on:
  schedule:
    - cron: "0 6 * * 1"   # chaque lundi à 6h UTC (filet de sécurité)
  push:
    branches: [main]
    paths: ['*.html']     # lastmod fiables : régénéré dès qu'une page change
  workflow_dispatch:

permissions:
  contents: write

# Sérialise les workflows qui committent (évite les pushs concurrents perdants)
concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet → vraies dates de modif par page

      - name: Generate sitemap.xml
        run: |
          DOMAIN="https://baguettechaussette.fr"

          # lastmod = date du dernier commit qui a touché la page
          # → le sitemap ne change que si une page a réellement changé
          lastmod() {
            git log -1 --format=%cI -- "$1"
          }

          cat <<EOF > sitemap.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${DOMAIN}/</loc>
              <lastmod>$(lastmod index.html)</lastmod>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>${DOMAIN}/events</loc>
              <lastmod>$(lastmod events.html)</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>${DOMAIN}/clips</loc>
              <lastmod>$(lastmod clips.html)</lastmod>
              <changefreq>weekly</changefreq>
              <priority>0.7</priority>
            </url>
            <url>
              <loc>${DOMAIN}/links</loc>
              <lastmod>$(lastmod links.html)</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>${DOMAIN}/mentions-legales</loc>
              <lastmod>$(lastmod mentions-legales.html)</lastmod>
              <changefreq>yearly</changefreq>
              <priority>0.3</priority>
            </url>
          </urlset>
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "No changes to commit." || (git commit -m "Update sitemap.xml [${{ github.run_id }}]" && git pull --rebase origin main && git push)

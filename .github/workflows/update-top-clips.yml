name: Update top clips (monthly window)

on:
  schedule:
    - cron: "23 5 */2 * *"   # rafraîchi tous les 2 jours à 5h23 UTC (fenêtre glissante de 30 jours)
  workflow_dispatch:

permissions:
  contents: write

# Sérialise les workflows qui committent (évite les pushs concurrents perdants)
concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # Mêmes secrets que update-followers.yml
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_BROADCASTER_ID: ${{ secrets.TWITCH_BROADCASTER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets presence
        run: |
          missing=0
          for var in TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET TWITCH_BROADCASTER_ID; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::$var is not set"
              missing=1
            fi
          done
          if [ $missing -ne 0 ]; then
            exit 1
          fi

      - name: Get App Access Token (client_credentials)
        run: |
          echo "Requesting access token..."
          RESP=$(curl -sS -X POST "https://id.twitch.tv/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$TWITCH_CLIENT_ID" \
            -d "client_secret=$TWITCH_CLIENT_SECRET" \
            -d "grant_type=client_credentials")

          if ! echo "$RESP" | jq -e .access_token >/dev/null; then
            echo "::group::Full response payload"
            echo "$RESP"
            echo "::endgroup::"
            echo "::error title=Token request failed::Missing access_token field"
            exit 1
          fi

          ACCESS_TOKEN=$(echo "$RESP" | jq -r '.access_token')
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "✅ Token successfully retrieved"

      - name: Fetch top clips of the month
        run: |
          echo "Fetching top clips for broadcaster_id=$TWITCH_BROADCASTER_ID ..."
          mkdir -p data

          STARTED_AT=$(date -u -d "30 days ago" +%Y-%m-%dT%H:%M:%SZ)
          ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          RESP=$(curl -sS --fail-with-body -G \
            -H "Client-Id: $TWITCH_CLIENT_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "broadcaster_id=$TWITCH_BROADCASTER_ID" \
            --data-urlencode "first=16" \
            --data-urlencode "started_at=$STARTED_AT" \
            --data-urlencode "ended_at=$ENDED_AT" \
            "https://api.twitch.tv/helix/clips") || {
              echo "::error title=Twitch API request failed::Unable to fetch clips"
              exit 1
            }

          if ! echo "$RESP" | jq -e '.data' >/dev/null; then
            echo "::group::Full response payload"
            echo "$RESP"
            echo "::endgroup::"
            echo "::error title=Invalid response::Missing data field"
            exit 1
          fi

          COUNT=$(echo "$RESP" | jq '.data | length')

          # Si aucun clip ce mois-ci, on garde les clips précédents
          if [ "$COUNT" -eq 0 ]; then
            echo "ℹ️ No clips this month — keeping previous data."
            exit 0
          fi

          # Table de correspondance game_id -> nom du jeu (1 appel batch)
          GAME_QS=$(echo "$RESP" | jq -r '[.data[].game_id | select(. != null and . != "")] | unique | map("id=" + .) | join("&")')
          GAMES='{}'
          if [ -n "$GAME_QS" ]; then
            GRESP=$(curl -sS \
              -H "Client-Id: $TWITCH_CLIENT_ID" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://api.twitch.tv/helix/games?$GAME_QS" || echo '{"data":[]}')
            GAMES=$(echo "$GRESP" | jq -c '[(.data // [])[] | {(.id): .name}] | add // {}')
          fi

          # Les clips épinglés à la main (pinned) sont préservés (titre maison prioritaire),
          # enrichis via l'API, et RETIRÉS s'ils ont été supprimés de Twitch (embed cassé sinon).
          PINNED=$(jq -c '.pinned // []' data/top-clips.json 2>/dev/null || echo '[]')
          PCOUNT=$(echo "$PINNED" | jq 'length')
          if [ "$PCOUNT" -gt 0 ]; then
            QS=$(echo "$PINNED" | jq -r 'map("id=" + .id) | join("&")')
            PRESP=$(curl -sS \
              -H "Client-Id: $TWITCH_CLIENT_ID" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://api.twitch.tv/helix/clips?$QS" || echo '{"data":[]}')
            API=$(echo "$PRESP" | jq -c '.data // []')

            DELETED=$(echo "$PINNED" | jq -r --argjson api "$API" \
              '[.[] | select(.id as $i | ($api | map(.id) | index($i)) | not) | .id] | join(", ")')
            if [ -n "$DELETED" ]; then
              echo "::warning title=Clip épinglé supprimé de Twitch::Retiré du site : $DELETED"
            fi

            PINNED=$(echo "$PINNED" | jq -c --argjson api "$API" --argjson games "$GAMES" \
              'def clipper: (.title // "") as $t | (if ($t | test("[(]by [^)]+[)]"; "i")) then ($t | capture("[(]by (?<c>[^)]+)[)]"; "i").c) else .creator_name end) | if type=="string" then gsub("^ +| +$";"") else . end;
               map(. as $p | ($api | map(select(.id == $p.id)) | .[0]) as $a
                 | select($a != null)
                 | {
                     id: $p.id,
                     title: (if ($p.title // "") != "" then $p.title else ($a.title // "") end),
                     creator_name: ($a | clipper),
                     game: ($games[$a.game_id // ""] // null),
                     view_count: $a.view_count,
                     created_at: $a.created_at,
                     duration: $a.duration,
                     thumbnail_url: ($a.thumbnail_url // $p.thumbnail_url),
                     url: $a.url
                   })')
          fi

          # clean_title : les titres capturés par le bot (WzBot = titre du stream, pas du clip)
          # sont vidés — le site affiche alors "Clip du JJ mois" à la place.
          echo "$RESP" | jq --argjson pinned "$PINNED" --argjson games "$GAMES" --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            'def clean_title: if (. // "") | startswith("WzBot CLIP") then "" else . end;
             def clipper: (.title // "") as $t | (if ($t | test("[(]by [^)]+[)]"; "i")) then ($t | capture("[(]by (?<c>[^)]+)[)]"; "i").c) else .creator_name end) | if type=="string" then gsub("^ +| +$";"") else . end;
             {pinned: $pinned,
              clips: [.data[] | select(.id as $i | ($pinned | map(.id) | index($i)) | not) | {
                id,
                title: (.title | clean_title),
                creator_name: clipper,
                game: ($games[.game_id // ""] // null),
                view_count, created_at, duration, thumbnail_url, url}],
              updated_at: $now}' \
            > data/top-clips.json

          echo "✅ Top clips: $COUNT (pinned preserved: $(echo "$PINNED" | jq 'length'))"

      - name: Build clippers leaderboard (all-time)
        run: |
          # Parcourt tout l'historique de clips (pages de 100, plafond 10 pages)
          # pour agréger le Panthéon des clippeurs dans data/clippers.json.
          : > /tmp/all-clips.jsonl
          CURSOR=""
          for i in $(seq 1 10); do
            URL="https://api.twitch.tv/helix/clips?broadcaster_id=$TWITCH_BROADCASTER_ID&first=100"
            if [ -n "$CURSOR" ]; then URL="$URL&after=$CURSOR"; fi
            PAGE=$(curl -sS \
              -H "Client-Id: $TWITCH_CLIENT_ID" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$URL" || echo '{"data":[]}')
            echo "$PAGE" | jq -c '(.data // [])[]' >> /tmp/all-clips.jsonl
            CURSOR=$(echo "$PAGE" | jq -r '.pagination.cursor // empty')
            if [ -z "$CURSOR" ]; then break; fi
          done

          TOTAL=$(wc -l < /tmp/all-clips.jsonl)
          echo "Clips historiques récupérés : $TOTAL"

          # En cas d'échec total de l'API on ne touche pas au fichier existant
          if [ "$TOTAL" -gt 0 ]; then
            jq -s --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              'def clipper: (.title // "") as $t | (if ($t | test("[(]by [^)]+[)]"; "i")) then ($t | capture("[(]by (?<c>[^)]+)[)]"; "i").c) else .creator_name end) | if type=="string" then gsub("^ +| +$";"") else . end;
               {clippers: (group_by(clipper) | map({
                  name: (.[0] | clipper),
                  clips: length,
                  total_views: ([.[].view_count] | add),
                  best_clip: (max_by(.view_count) | {id, title, view_count})
                }) | sort_by(-.clips, -.total_views)),
                total_clips: length,
                updated_at: $now}' /tmp/all-clips.jsonl > data/clippers.json
            echo "✅ Panthéon : $(jq '.clippers | length' data/clippers.json) clippeurs"
          fi

      - name: Commit if changed
        run: |
          if ! git diff --quiet data/top-clips.json data/clippers.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/top-clips.json data/clippers.json
            git commit -m "chore: update top clips (monthly window)"
            git pull --rebase origin main
            git push
            echo "✅ Changes committed and pushed."
          else
            echo "No changes detected."
          fi

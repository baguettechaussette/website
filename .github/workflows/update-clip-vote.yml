name: Update clip of the week (vote)

# Fonctionnement — 100 % automatique via le compteur Cloudflare (voir cloudflare/README.md) :
#   La semaine de clips va de DIMANCHE à DIMANCHE, calée sur le dépouillement
#   (17h45 UTC) : tout clip créé après un dépouillement concourt pour le vote
#   suivant, avec une semaine pleine devant lui. Le dépouillement a lieu quand
#   la semaine de vote TOURNE (quel que soit le déclencheur) : gagnant = clip
#   le plus voté (par identité de clip), archivé au Palmarès
#   (data/hall-of-fame.json, non affiché sur le site), puis le top 4 de la
#   fenêtre écoulée devient finaliste de la semaine suivante.
#   • Dimanche 17h45 UTC : dépouillement + rotation (avant le live de 21h Paris).
#   • Lundi 6h UTC : filet de sécurité si le run du dimanche a échoué + filet annonce.
#   • Mercredi 6h UTC : purge mi-semaine des clips supprimés + filet annonce.
#   • Jeudi 10h UTC (midi Paris l'été) : rappel de vote sur Discord.
#   • Run manuel : bootstrap ou rattrapage (dépouille aussi si la semaine doit
#     tourner) ; override possible (input = ID du clip gagnant), jamais requis.
#
# Annonce Discord : manuelle, depuis le tableau de suivi privé du worker
# Cloudflare (bouton sur /board), pendant le live du dimanche. Le cron du
# dimanche n'envoie rien sur Discord : pas de spoiler avant la révélation.
on:
  schedule:
    # 17h45 UTC (pas :00 : créneau surchargé chez GitHub, retards fréquents)
    # = 19h45 Paris l'été / 18h45 l'hiver : large marge avant le live de 21h.
    # NB : cette heure est AUSSI la frontière de la fenêtre des clips
    # (voir STARTED_AT/ENDED_AT) : si tu la changes, change-la aux deux endroits.
    - cron: "45 17 * * 0"  # dimanche : dépouillement + rotation
    - cron: "0 6 * * 1"    # lundi 6h UTC : filet si échec dimanche + filet annonce
    - cron: "0 6 * * 3"    # mercredi 6h UTC : purge mi-semaine + filet annonce
    - cron: "0 10 * * 4"   # jeudi 10h UTC : rappel de vote (midi Paris l'été, 11h l'hiver)
  workflow_dispatch:
    inputs:
      winner:
        description: "Override : ID du clip gagnant (laisser vide = dépouillement auto par les votes)."
        required: false
        type: string

permissions:
  contents: write

# Groupe DÉDIÉ : dans un groupe partagé avec twitch-live (toutes les 5 min),
# un run de dépouillement en file d'attente serait ANNULÉ silencieusement dès
# qu'un autre run se met en file derrière lui. Les pushs concurrents sont déjà
# gérés par le pull --rebase du step de commit.
concurrency:
  group: clip-of-week
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_BROADCASTER_ID: ${{ secrets.TWITCH_BROADCASTER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Get App Access Token (client_credentials)
        run: |
          RESP=$(curl -sS --fail -X POST "https://id.twitch.tv/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$TWITCH_CLIENT_ID" \
            -d "client_secret=$TWITCH_CLIENT_SECRET" \
            -d "grant_type=client_credentials") || {
              echo "::error title=Token request failed::HTTP error from id.twitch.tv"
              exit 1
            }
          if ! echo "$RESP" | jq -e '.access_token' >/dev/null; then
            echo "::error title=Token request failed::Missing access_token field"
            exit 1
          fi
          ACCESS_TOKEN=$(echo "$RESP" | jq -r '.access_token')
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Dépouille le vote et prépare la semaine suivante
        env:
          MANUAL_WINNER: ${{ github.event.inputs.winner }}
          # URL du Worker Cloudflare (variable de dépôt, ex. https://bc-vote.xxx.workers.dev)
          VOTE_API_URL: ${{ vars.VOTE_API_URL }}
          # /results est verrouillé derrière la clé du board (un décompte public
          # en direct révélerait le gagnant probable avant le live)
          BOARD_KEY: ${{ secrets.BOARD_KEY }}
        run: |
          mkdir -p data
          PREV=$(cat data/clip-of-week.json 2>/dev/null || echo '{}')
          WEEK=$(echo "$PREV" | jq -r '.week // empty')
          FCOUNT=$(echo "$PREV" | jq '(.finalists // []) | length')

          # ── 0. Purge : finaliste ou gagnant supprimé de Twitch ──
          # Un clip supprimé casse la vignette et l'embed : on le retire du vote
          # (et du palmarès), et ses votes sont ignorés au dépouillement puisque
          # seuls les votes portant sur un finaliste réel comptent. La purge est
          # sautée si l'API ne répond pas (on ne vide jamais sur un doute).
          WINNER_ID=$(echo "$PREV" | jq -r '.winner.id // empty')
          if [ "$FCOUNT" -gt 0 ] || [ -n "$WINNER_ID" ]; then
            QS=$(echo "$PREV" | jq -r '([(.finalists // [])[].id] + [.winner.id // empty]) | unique | map("id=" + .) | join("&")')
            PRESP=$(curl -sS \
              -H "Client-Id: $TWITCH_CLIENT_ID" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://api.twitch.tv/helix/clips?$QS" || echo '')
            if echo "$PRESP" | jq -e '.data' >/dev/null 2>&1; then
              ALIVE=$(echo "$PRESP" | jq -c '[.data[].id]')
              PRUNED=$(echo "$PREV" | jq -c --argjson alive "$ALIVE" \
                '.finalists = [(.finalists // [])[] | select(.id as $i | $alive | index($i))]
                 | .winner = (if (.winner | not) or ((.winner.id as $i | $alive | index($i))) then .winner else null end)')
              if [ "$PRUNED" != "$(echo "$PREV" | jq -c .)" ]; then
                echo "::warning title=Clip supprimé de Twitch::Retiré du vote ou du palmarès (vignette et lecture cassées sinon)."
                PREV="$PRUNED"
                FCOUNT=$(echo "$PREV" | jq '(.finalists // []) | length')
                echo "$PREV" | jq . > data/clip-of-week.json
              fi
            else
              echo "::notice title=Purge sautée::Vérification des clips impossible (API muette), on ne touche à rien."
            fi
          fi

          # ── 1. Ancre temporelle ──
          #   • cron → "demain" : le dimanche 18h, demain = lundi = la semaine de
          #     vote suivante (le dimanche appartient encore à la semaine qui se
          #     termine, comparer à "aujourd'hui" ne dépouillerait JAMAIS).
          #   • lancement manuel → "aujourd'hui" : bootstrap immédiat, vote pour
          #     la dernière semaine ISO déjà terminée (pas celle en cours).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ANCHOR="today"
          else
            ANCHOR="tomorrow"
          fi
          NEXT_WEEK=$(date -u -d "$ANCHOR" +%G-W%V)

          # Jamais de retour en arrière : un run manuel le dimanche soir après la
          # rotation ne doit pas rouvrir un vote déjà dépouillé.
          if [ -n "$WEEK" ] && [ "$WEEK" \> "$NEXT_WEEK" ]; then
            echo "ℹ️ La semaine $WEEK est déjà en place (en avance sur $NEXT_WEEK) : rien à faire."
            exit 0
          fi

          # Cron avec la semaine déjà en place (régime normal lundi/mercredi/jeudi) :
          # la purge de l'étape 0 a déjà fait son travail, rien d'autre ici
          # (la fenêtre dimanche→dimanche fait qu'aucun clip éligible ne peut
          # apparaître après le dépouillement : pas de refresh nécessaire).
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$WEEK" = "$NEXT_WEEK" ]; then
            echo "ℹ️ Semaine $NEXT_WEEK déjà en place (dépouillement déjà fait) : purge seule."
            exit 0
          fi

          # ── 2. Dépouillement (par identité de clip) ──
          # On dépouille quand on FERME une semaine (la semaine du fichier va
          # changer), quel que soit le déclencheur : cron du dimanche, filet du
          # lundi, ou run manuel de rattrapage. Une semaine encore en cours n'est
          # jamais dépouillée (vote partiel) : palmarès conservé tel quel.
          ROLLING=0
          if [ -n "$WEEK" ] && [ "$WEEK" != "$NEXT_WEEK" ]; then ROLLING=1; fi

          if [ "$ROLLING" = "1" ]; then
            # La semaine tourne : le palmarès repart de zéro (pas de gagnant
            # fantôme d'il y a deux semaines si personne n'a voté).
            WINNER='null'
            VOTES='null'
          else
            WINNER=$(echo "$PREV" | jq -c '.winner // null')
            VOTES=$(echo "$PREV" | jq -c '.votes // null')
          fi

          if [ -n "$MANUAL_WINNER" ]; then
            # Override explicite : l'ID doit être un finaliste de la semaine OU
            # le gagnant déjà couronné (re-couronner le même clip = re-poster
            # l'annonce sans rien changer). Un ID inconnu est refusé (une faute
            # de frappe ne doit pas effacer le palmarès).
            WINNER=$(echo "$PREV" | jq -c --arg id "$MANUAL_WINNER" \
              '([ (.finalists // [])[], (.winner // empty) ] | map(select(.id == $id)) | .[0]) // null')
            if [ "$WINNER" = "null" ] || [ -z "$WINNER" ]; then
              echo "::error title=Override invalide::$MANUAL_WINNER n'est ni un finaliste ni le gagnant actuel, rien n'est modifié."
              exit 1
            fi
            echo "🏆 Gagnant de $WEEK : $MANUAL_WINNER (override manuel)"
          elif [ "$ROLLING" = "1" ] && [ "$FCOUNT" -gt 0 ]; then
            if [ -n "$VOTE_API_URL" ]; then
              # Compteur injoignable = on ARRÊTE (job en échec, le cron suivant
              # réessaiera). Surtout pas de repli silencieux vers "0 votes" :
              # ça ferait tourner la semaine en jetant les votes réels.
              R=$(curl -sS --fail "$VOTE_API_URL/results/$WEEK?key=$BOARD_KEY") || {
                echo "::error title=Compteur injoignable::Dépouillement impossible, votes préservés, nouvel essai au prochain cron."
                exit 1
              }
              echo "$R" | jq -e . >/dev/null || {
                echo "::error title=Réponse invalide du compteur::Dépouillement annulé, votes préservés."
                exit 1
              }
              # Ne compte que les votes portant sur un finaliste réel de la semaine
              VOTES=$(echo "$PREV" | jq -c --argjson r "$R" \
                '[.finalists[].id] | map({(.): ($r[.] // 0)}) | add // {}')
              # Égalité : le tri stable garde l'ordre des finalistes (viewers
              # d'abord, puis par vues) : l'ex æquo le mieux classé l'emporte.
              WIN_ID=$(echo "$VOTES" | jq -r '[to_entries[] | select(.value > 0)] | sort_by(-.value) | .[0].key // empty')
              if [ -n "$WIN_ID" ]; then
                WINNER=$(echo "$PREV" | jq -c --arg id "$WIN_ID" '(.finalists[] | select(.id == $id)) // null')
                echo "🏆 Gagnant de $WEEK : $WIN_ID ($(echo "$VOTES" | jq -c .))"
                # ── Palmarès : chaque couronné rejoint data/hall-of-fame.json ──
                # (dédupliqué par semaine : un re-dépouillement remplace l'entrée)
                HOF=$(cat data/hall-of-fame.json 2>/dev/null || echo '{"winners":[]}')
                WVOTES=$(echo "$VOTES" | jq --arg id "$WIN_ID" '.[$id] // 0')
                echo "$HOF" | jq --argjson w "$WINNER" --arg week "$WEEK" --argjson v "$WVOTES" \
                  --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                  '.winners = ([(.winners // [])[] | select(.week != $week)]
                     + [{week: $week, votes: $v, crowned_at: $now}
                        + ($w | {id, title, creator_name, view_count, thumbnail_url})])
                   | .updated_at = $now' > data/hall-of-fame.json
                echo "👑 Palmarès : $(jq '.winners | length' data/hall-of-fame.json) gagnants archivés"
              else
                echo "ℹ️ Aucun vote cette semaine : pas de gagnant"
              fi
            else
              # Même exigence que "compteur injoignable" : on n'accepte JAMAIS
              # de tourner la semaine en jetant les votes. Variable effacée par
              # erreur = job rouge, pas de perte silencieuse.
              echo "::error title=Compteur absent::VOTE_API_URL non défini : rotation refusée, votes préservés."
              exit 1
            fi
          elif [ "$ROLLING" = "1" ]; then
            echo "ℹ️ Semaine fermée sans finalistes : rien à dépouiller."
          else
            echo "ℹ️ Semaine $WEEK inchangée : palmarès conservé, pas de dépouillement."
          fi

          # ── 3. Finalistes : top 4 de la fenêtre DIMANCHE → DIMANCHE, calée
          #    sur l'heure nominale du dépouillement (17h45 UTC, comme le cron).
          #    Tout clip créé après un dépouillement concourt pour le vote
          #    suivant, avec une semaine pleine de vote : rien ne rejoint ni ne
          #    quitte la course en cours de semaine. L'heure NOMINALE (pas
          #    l'heure réelle du run, qui dérive) garantit des fenêtres
          #    parfaitement jointives d'une semaine à l'autre.

          # Les finalistes d'une semaine de vote déjà en place sont FIGÉS :
          # les remplacer en cours de route invaliderait les votes déjà exprimés
          # (et les votants ne peuvent pas revoter).
          if [ "$WEEK" = "$NEXT_WEEK" ] && [ "$FCOUNT" -ge 2 ]; then
            echo "ℹ️ Finalistes de $NEXT_WEEK déjà figés : conservés tels quels (protège les votes en cours)."
            FIN=$(echo "$PREV" | jq -c '.finalists')
          else

          ADOW=$(date -u -d "$ANCHOR" +%u)                              # 1=lun .. 7=dim
          VOTE_MON=$(date -u -d "$ANCHOR -$((ADOW-1)) days" +%Y-%m-%d)  # lundi de la semaine de vote
          # Fenêtre = du dimanche 17h45 UTC (8 jours avant ce lundi) au
          # dimanche 17h45 UTC suivant (veille de ce lundi) : dimanche→dimanche.
          STARTED_AT=$(date -u -d "$VOTE_MON -8 days" +%Y-%m-%dT17:45:00Z)
          ENDED_AT=$(date -u -d "$VOTE_MON -1 day" +%Y-%m-%dT17:45:00Z)
          RESP=$(curl -sS --fail -G \
            -H "Client-Id: $TWITCH_CLIENT_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "broadcaster_id=$TWITCH_BROADCASTER_ID" \
            --data-urlencode "first=100" \
            --data-urlencode "started_at=$STARTED_AT" \
            --data-urlencode "ended_at=$ENDED_AT" \
            "https://api.twitch.tv/helix/clips") || {
              echo "::error title=Twitch API request failed::Unable to fetch weekly clips"
              exit 1
            }

          # On privilégie les clips des viewers ; les clips du streamer ne
          # complètent la liste que s'il n'y a pas assez de clips communautaires
          # pour remplir les 4 places (Twitch renvoie déjà trié par vues desc).
          FIN=$(echo "$RESP" | jq -c \
            'def clean_title: if (. // "") | startswith("WzBot CLIP") then "" else . end;
             def clipper: (.title // "") as $t | (if ($t | test("[(]by [^)]+[)]"; "i")) then ($t | capture("[(]by (?<c>[^)]+)[)]"; "i").c) else .creator_name end) | if type=="string" then gsub("^ +| +$";"") else . end;
             [(.data // [])[] | {id, title: (.title | clean_title), creator_name: clipper, view_count, created_at, thumbnail_url, own: ((clipper | ascii_downcase) == "baguettechaussette")}]
             | (map(select(.own | not)) + map(select(.own)))[0:4]
             | map(del(.own))')

          # Semaine creuse (moins de 2 clips) : on repart du top du mois, avec
          # les mêmes règles (nettoyage des titres bot, extraction du vrai
          # clippeur, priorité viewers) : le fichier peut être à l'ancien format
          # (creator_name absent), le titre reste la source de vérité.
          if [ "$(echo "$FIN" | jq 'length')" -lt 2 ]; then
            echo "ℹ️ Semaine creuse, finalistes pris dans le top du mois"
            FIN=$(jq -c \
              'def clean_title: if (. // "") | startswith("WzBot CLIP") then "" else . end;
               def clipper: (.title // "") as $t | (if ($t | test("[(]by [^)]+[)]"; "i")) then ($t | capture("[(]by (?<c>[^)]+)[)]"; "i").c) else .creator_name end) | if type=="string" then gsub("^ +| +$";"") else . end;
               [(.clips // [])[] | {id, title: (.title | clean_title), creator_name: clipper, view_count, created_at, thumbnail_url, own: (((clipper // "") | ascii_downcase) == "baguettechaussette")}]
               | (map(select(.own | not)) + map(select(.own)))[0:4]
               | map(del(.own))' \
              data/top-clips.json 2>/dev/null || echo '[]')
          fi

          fi  # fin du bloc "finalistes à recalculer"

          jq -n --arg week "$NEXT_WEEK" --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson finalists "$FIN" --argjson winner "$WINNER" --argjson votes "$VOTES" \
            '{week: $week, finalists: $finalists, winner: $winner, votes: $votes, updated_at: $now}' \
            > data/clip-of-week.json

          echo "✅ Semaine $NEXT_WEEK : $(echo "$FIN" | jq 'length') finalistes"

      - name: Commit if changed
        run: |
          # Garde-fou : un dispatch lancé par mégarde depuis une autre branche
          # ne doit pas y injecter l'historique de main via pull --rebase.
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "ℹ️ Branche ${{ github.ref_name }} : pas de commit (réservé à main)."
            exit 0
          fi
          if ! git diff --quiet data/clip-of-week.json data/hall-of-fame.json 2>/dev/null || [ -n "$(git status --porcelain data/hall-of-fame.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/clip-of-week.json data/hall-of-fame.json
            git commit -m "chore: update clip of the week (vote + finalistes + palmares)"
            git pull --rebase origin main
            git push
            echo "✅ Changes committed and pushed."
          else
            echo "No changes detected."
          fi

      # L'annonce Discord du gagnant se déclenche à la main depuis le tableau
      # de suivi privé (route /board du worker, bouton "Envoyer l'annonce"),
      # pendant le live du dimanche. Zéro spoiler avant la révélation.
      #
      # Filet anti-oubli : les crons du lundi et du mercredi (JAMAIS celui du
      # dimanche, qui tombe avant le live) demandent au worker d'envoyer
      # l'annonce. Le marqueur KV du worker garantit qu'elle ne part qu'une
      # fois : si le clic du live a eu lieu, le filet ne fait rien (409).
      # NB : les chaînes doivent être EXACTEMENT celles des crons ci-dessus.
      - name: Filet anti-oubli de l'annonce Discord
        if: ${{ github.event_name == 'schedule' && (github.event.schedule == '0 6 * * 1' || github.event.schedule == '0 6 * * 3') }}
        env:
          BOARD_KEY: ${{ secrets.BOARD_KEY }}
          VOTE_API_URL: ${{ vars.VOTE_API_URL }}
        run: |
          if [ -z "$BOARD_KEY" ] || [ -z "$VOTE_API_URL" ]; then
            echo "::notice title=Filet annonce inactif::BOARD_KEY ou VOTE_API_URL manquant."
            exit 0
          fi
          # Si CE run vient de couronner (rattrapage), le worker lit le JSON du
          # site derrière un CDN (~10 min de cache, insensible aux cache-busters)
          # + le rebuild Pages : on patiente pour annoncer le BON gagnant.
          echo "Patience anti-cache CDN (7 min)…"
          sleep 420
          CODE=$(curl -sS -o /tmp/announce.json -w "%{http_code}" -X POST \
            "$VOTE_API_URL/announce?key=$BOARD_KEY" || true)
          BODY=$(cat /tmp/announce.json 2>/dev/null || echo '')
          case "$CODE" in
            200) echo "📣 Annonce envoyée par le filet (oubliée au live)." ;;
            409) echo "ℹ️ Rien à faire : $BODY" ;;
            # Échec réel = job ROUGE : une annonce qui saute en silence pourrait
            # être définitivement perdue à la rotation suivante.
            *)   echo "::error title=Filet annonce en échec (HTTP ${CODE:-aucun})::$BODY"; exit 1 ;;
          esac

      # Rappel de vote en milieu de semaine (jeudi midi) : relance la
      # participation avec le nombre de votants, sans jamais dire qui mène.
      # Idempotent côté worker (marqueur par semaine), non bloquant si échec.
      - name: Rappel de vote du jeudi midi
        if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 10 * * 4' }}
        env:
          BOARD_KEY: ${{ secrets.BOARD_KEY }}
          VOTE_API_URL: ${{ vars.VOTE_API_URL }}
        run: |
          if [ -z "$BOARD_KEY" ] || [ -z "$VOTE_API_URL" ]; then
            echo "::notice title=Rappel inactif::BOARD_KEY ou VOTE_API_URL manquant."
            exit 0
          fi
          CODE=$(curl -sS -o /tmp/remind.json -w "%{http_code}" -X POST \
            "$VOTE_API_URL/remind?key=$BOARD_KEY" || true)
          BODY=$(cat /tmp/remind.json 2>/dev/null || echo '')
          case "$CODE" in
            200) echo "🗳️ Rappel de vote envoyé sur Discord." ;;
            409) echo "ℹ️ Rappel déjà envoyé ou pas de vote en cours : $BODY" ;;
            *)   echo "::warning title=Rappel non envoyé (HTTP ${CODE:-aucun})::$BODY" ;;
          esac

name: Update clip of the week (vote)

# Fonctionnement (plan Umami gratuit, sans API) :
#   • Le dimanche avant le live : ouvrir le dashboard Umami (section Événements),
#     lire les compteurs vote-<semaine>-1..4, puis lancer ce workflow avec le
#     numéro du gagnant → il couronne ET prépare les finalistes suivants.
#   • Le cron du lundi matin est un filet de sécurité : si le dépouillement a été
#     oublié, il fait tourner les finalistes (sans gagnant, ou via l'API si un
#     secret UMAMI_API_KEY existe un jour — plan Pro).
on:
  schedule:
    - cron: "0 6 * * 1"    # lundi 6h UTC : rotation de secours si oubli du dimanche
  workflow_dispatch:
    inputs:
      winner:
        description: "Numéro du finaliste gagnant (1-4), lu dans Umami > Événements. Vide = pas de gagnant."
        required: false
        type: string

permissions:
  contents: write

# Sérialise les workflows qui committent (évite les pushs concurrents perdants)
concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_BROADCASTER_ID: ${{ secrets.TWITCH_BROADCASTER_ID }}
      # Clé API Umami Cloud (Settings > API keys) — sans elle, le gagnant
      # est simplement le finaliste le plus vu (fallback signalé en warning).
      UMAMI_API_KEY: ${{ secrets.UMAMI_API_KEY }}
      UMAMI_WEBSITE_ID: aa7093c8-a182-4b89-8b6d-708a318564b1

    steps:
      - uses: actions/checkout@v4

      - name: Get App Access Token (client_credentials)
        run: |
          RESP=$(curl -sS --fail -X POST "https://id.twitch.tv/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$TWITCH_CLIENT_ID" \
            -d "client_secret=$TWITCH_CLIENT_SECRET" \
            -d "grant_type=client_credentials") || {
              echo "::error title=Token request failed::HTTP error from id.twitch.tv"
              exit 1
            }
          if ! echo "$RESP" | jq -e '.access_token' >/dev/null; then
            echo "::error title=Token request failed::Missing access_token field"
            exit 1
          fi
          ACCESS_TOKEN=$(echo "$RESP" | jq -r '.access_token')
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Dépouille le vote et prépare la semaine suivante
        env:
          MANUAL_WINNER: ${{ github.event.inputs.winner }}
        run: |
          mkdir -p data
          PREV=$(cat data/clip-of-week.json 2>/dev/null || echo '{}')
          WEEK=$(echo "$PREV" | jq -r '.week // empty')
          FCOUNT=$(echo "$PREV" | jq '(.finalists // []) | length')

          # Filet de sécurité du lundi : si le dimanche a déjà fait la rotation,
          # ne rien écraser (le gagnant couronné manuellement doit survivre).
          CURRENT_WEEK=$(date -u +%G-W%V)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$WEEK" = "$CURRENT_WEEK" ]; then
            echo "ℹ️ Semaine $CURRENT_WEEK déjà en place (dépouillement fait dimanche) : rien à faire."
            exit 0
          fi

          # ── 1. Dépouillement de la semaine écoulée ─────────────────────
          WINNER='null'
          VOTES='null'
          if [ -n "$WEEK" ] && [ "$FCOUNT" -gt 0 ]; then
            if [ -n "$MANUAL_WINNER" ]; then
              # Dépouillement manuel : numéro lu dans le dashboard Umami
              case "$MANUAL_WINNER" in
                [1-4]) ;;
                *) echo "::error title=Entrée invalide::winner doit être 1, 2, 3 ou 4"; exit 1 ;;
              esac
              WINNER=$(echo "$PREV" | jq -c --argjson i "$MANUAL_WINNER" '.finalists[$i - 1] // null')
              echo "🏆 Gagnant de $WEEK : finaliste #$MANUAL_WINNER (dépouillement manuel)"
            elif [ -n "$UMAMI_API_KEY" ]; then
              START_MS=$(( $(date -u -d "last monday" +%s) * 1000 ))
              END_MS=$(( $(date -u +%s) * 1000 ))
              M=$(curl -sS -H "x-umami-api-key: $UMAMI_API_KEY" \
                "https://api.umami.is/v1/websites/$UMAMI_WEBSITE_ID/metrics?type=event&startAt=$START_MS&endAt=$END_MS&limit=500" \
                || echo '[]')
              # Événements "vote-<semaine>-<n>" -> {"1": 12, "2": 5, ...}
              # (seuls les suffixes 1-4 sont acceptés : un event forgé est ignoré)
              VOTES=$(echo "$M" | jq -c --arg w "$WEEK" \
                '[(. // [])[] | select((.x // "") | test("^vote-" + $w + "-[1-4]$"))
                  | {((.x | sub("^vote-" + $w + "-"; ""))): .y}] | add // {}')
              IDX=$(echo "$VOTES" | jq -r 'to_entries | max_by(.value) | .key // empty')
              if [ -n "$IDX" ]; then
                WINNER=$(echo "$PREV" | jq -c --argjson i "$IDX" '.finalists[$i - 1] // null')
                echo "🏆 Gagnant de $WEEK : finaliste #$IDX ($(echo "$VOTES" | jq -c .))"
              else
                echo "ℹ️ Aucun vote enregistré cette semaine : pas de gagnant"
              fi
            else
              echo "::notice title=Dépouillement sauté::Ni numéro manuel ni clé API : pas de gagnant cette semaine (les finalistes tournent quand même)."
            fi
          fi

          # ── 2. Finalistes de la semaine suivante : top 4 des 7 derniers jours ──
          STARTED_AT=$(date -u -d "7 days ago" +%Y-%m-%dT%H:%M:%SZ)
          RESP=$(curl -sS --fail -G \
            -H "Client-Id: $TWITCH_CLIENT_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "broadcaster_id=$TWITCH_BROADCASTER_ID" \
            --data-urlencode "first=4" \
            --data-urlencode "started_at=$STARTED_AT" \
            "https://api.twitch.tv/helix/clips") || {
              echo "::error title=Twitch API request failed::Unable to fetch weekly clips"
              exit 1
            }

          FIN=$(echo "$RESP" | jq -c \
            'def clean_title: if (. // "") | startswith("WzBot CLIP") then "" else . end;
             [(.data // [])[] | {id, title: (.title | clean_title), creator_name, view_count, created_at, thumbnail_url}]')

          # Semaine creuse (moins de 2 clips) : on repart du top du mois
          if [ "$(echo "$FIN" | jq 'length')" -lt 2 ]; then
            echo "ℹ️ Semaine creuse, finalistes pris dans le top du mois"
            FIN=$(jq -c '[(.clips // [])[0:4][] | {id, title, creator_name, view_count, created_at, thumbnail_url}]' \
              data/top-clips.json 2>/dev/null || echo '[]')
          fi

          # Lancé dimanche soir : demain = lundi = semaine de vote suivante.
          # Cron du lundi : demain = mardi = même semaine ISO, ça tombe juste aussi.
          NEXT_WEEK=$(date -u -d "tomorrow" +%G-W%V)

          jq -n --arg week "$NEXT_WEEK" --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson finalists "$FIN" --argjson winner "$WINNER" --argjson votes "$VOTES" \
            '{week: $week, finalists: $finalists, winner: $winner, votes: $votes, updated_at: $now}' \
            > data/clip-of-week.json

          echo "✅ Semaine $NEXT_WEEK : $(echo "$FIN" | jq 'length') finalistes"

      - name: Commit if changed
        run: |
          if ! git diff --quiet data/clip-of-week.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/clip-of-week.json
            git commit -m "chore: update clip of the week (vote + finalistes)"
            git pull --rebase origin main
            git push
            echo "✅ Changes committed and pushed."
          else
            echo "No changes detected."
          fi
